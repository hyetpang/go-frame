[server]
run_mode = "dev"

[http]
addr = ":8081"
is_doc = true
doc_path = "/swagger/*any"
is_pprof = true
pprof_prefix = ""
pprof_username = "CHANGE_ME"
pprof_password = "CHANGE_ME"
is_metrics = true
metrics_path = "/metrics"
is_prod = false
max_body_bytes = 10485760  # 单个请求体最大字节数,默认 10 MiB

[mysql]
connect_string = "user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8mb4&parseTime=True&loc=Local"
max_idle_time = 30
max_life_time = 60
max_idle_conns = 10
max_open_conns = 100
table_prefix = "su"
gorm_log_ignore_record_not_found_error = true
gorm_log_level = 4
name = "default"

[redis]
addr = "127.0.0.1:6379"
pwd = ""
db = 1

[mail]
user = "user@example.com"
pass = "your_mail_password"
host = "smtp.example.com"
port = 465

[sms]
secret = "your_sms_secret"
group = "your_group"
url = "http://sms.example.com/sms"

[log_notice]
name = "myapp"
notice_type = 1
notice = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your_webhook_key"
limit_window_seconds = 60
limit_max_keys = 1024
is_limit_disabled = false

[zap_log]
path = ""
service_name = "myapp"
level = -1
stacktrace_level = 1
is_log_file = false
log_max_size = 128
log_max_backups = 30
log_max_age = 7

[grpc]
address = ""
service_prefix = "grpc_services"
service_names = ["Hello"]

# 开发环境默认明文,如需联调 TLS 把 enable 改 true 并提供证书路径
[grpc.server_tls]
enable = false

[grpc.client_tls]
enable = false

[etcd]
addresses = "127.0.0.1:2379"
username = ""
password = ""

[etcd.tls]
enable = false

[kafka]
addr = ""
client_id = "myapp-dev"

[gout]
debug = true
timeout = 5
