[server] # 自定义的配置
run_mode = "dev"

#### 以下的配置都是使用go-frame框架需要用到的配置,按需配置，例如用到了mysql就加mysql的配置，用到redis就加redis配置，然后在main文件增加
##### options.WithMysql()和options.WithRedis()代码，即可创建mysql以及redis的依赖再使用即可
[http]
addr = ":8081"             # http服务监听地址
is_doc = true              # 是否开启swagger文档
doc_path = "/swagger/*any" # 文档路由
is_pprof = true            # 是否开启pprof
pprof_prefix = ""          # pprof 路径前缀
pprof_username = "CHANGE_ME"  # pprof basic auth 用户名,部署前必须替换
pprof_password = "CHANGE_ME"  # pprof basic auth 密码,要求长度 >= 12 且不能等于 admin/secret/CHANGE_ME
is_metrics = true          # 是否使用指标
metrics_path = "/metrics"  # 指标导出url
is_prod = false            # 是否在线上环境
max_body_bytes = 10485760  # 单个请求体最大字节数,默认 10 MiB

[mysql]
connect_string = "user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8mb4&parseTime=True&loc=Local" # mysql连接字符串
max_idle_time = 30                                                                                                     # 单位：分钟
max_life_time = 60                                                                                                     # 单位：分钟
max_idle_conns = 10                                                                                                    # 最大的空闲连接
max_open_conns = 100                                                                                                   # 最大打开的连接数
table_prefix = "su"                                                                                                    # 表前缀
gorm_log_ignore_record_not_found_error = true                                                                          # 是否忽略gorm没找到记录的日志打印
gorm_log_level = 4                                                                                                     # gorm日志级别,1=>静默，什么都不打印,2=>error,3=>warn,4=>info,sql在4级别打印
name = "default"                                                                                                       # mysql配置的名字，default表示是主数据库，名字必须是default,如果是多个数据库,按toml的数组格式配置即可

[redis]
addr = "127.0.0.1:6379"  # redis连接地址
username = ""            # Redis 6+ ACL 用户名,留空兼容旧版本
pwd = ""                 # redis密码
db = 1                   # 使用的数据库 0~15
pool_size = 0            # 连接池大小,0 表示按 10*GOMAXPROCS 自动推导
min_idle_conns = 5       # 最小空闲连接数
dial_timeout = 5         # 拨号超时,单位秒
read_timeout = 5         # 读超时,单位秒
write_timeout = 5        # 写超时,单位秒

# Redis TLS,enable=false 时走明文 (向后兼容)
# 跨网/公网调用强烈建议启用 TLS 防止凭据/PII 流量被嗅探
[redis.tls]
enable = false
ca_file = ""              # 校验 redis 服务端证书的 CA
cert_file = ""            # 可选: 启用 mTLS 时使用的客户端证书
key_file = ""             # 可选: 启用 mTLS 时使用的客户端私钥
server_name = ""          # SNI / 证书 CommonName 校验
insecure_skip_verify = false # ⚠️ 仅供本地调试,生产环境严禁开启

[mail]
user = "user@example.com"    # 邮箱用户名
pass = "your_mail_password"   # 邮箱密码
host = "smtp.example.com"    # 邮箱主机
port = 465                   # 邮箱端口

[sms]
secret = "your_sms_secret"          # 短信密钥
group = "your_group"                # 短信分组
url = "http://sms.example.com/sms"  # 短信发送url

[log_notice] # 这是错误日志通知的配置
name = "myapp"                                                                                        # 应用名称
notice_type = 1                                                                                       # 通知类型,1=>企业微信,2=>邮件,3=>飞书,4=>telegram
notice = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your_webhook_key"                      # 通知地址
limit_window_seconds = 60                                                                             # 同一错误通知聚合窗口，单位秒
limit_max_keys = 1024                                                                                 # 聚合窗口内最多保留的错误摘要数量
is_limit_disabled = false                                                                             # 是否关闭错误通知限流聚合


[zap_log] # 日志配置不是必传，不配置，默认的日志文件路径在可执行程序所在目录下的log目录下，level是0
file = ""  # 日志文件的路径
level = -1 # 日志级别,可能的值是,-1=>debug,0=>info,1=>warn,2=>error,不配置默认是0
stacktrace_level = 1 # 打印堆栈的日志级别,-1=>debug,0=>info,1=>warn,2=>error,不配置默认是1
log_max_size = 128   # 单个日志文件最大大小，单位MB
log_max_backups = 30 # 日志最多保留备份数
log_max_age = 7      # 日志最多保留天数


[grpc]
address = "" # 启动一个grpc server时，这个表示监听地址,启动一个grpc client的时候，表示要连接的grpc server地址,使用etcd作为服务发现时，client可不填
service_prefix = "grpc_services" # 服务注册前缀,不传。默认是grpc_services
service_names = [
    "Hello",
] # 指定当前启动的服务名字或者客户端要解析的服务名字,这个仅client有效，在grpc server启动的时候服务名字会打印在控制台,不使用etcd作为服务发现，可不填

# grpc server TLS 配置,enable=false 时走明文 (向后兼容)
# 启用时必须配置 cert_file 与 key_file;若同时配置 ca_file 则强制 mTLS (RequireAndVerifyClientCert)
[grpc.server_tls]
enable = false
cert_file = ""    # 服务端证书 PEM 路径
key_file = ""     # 服务端私钥 PEM 路径
ca_file = ""      # 可选: 校验客户端证书的 CA,设置后启用 mTLS

# grpc client TLS 配置,enable=false 时走明文
# 公网/跨网调用强烈建议启用 TLS 防止凭据/PII 流量被嗅探
[grpc.client_tls]
enable = false
ca_file = ""              # 可选: 校验服务端证书的 CA,留空使用系统根证书
cert_file = ""            # 可选: 启用 mTLS 时使用的客户端证书
key_file = ""             # 可选: 启用 mTLS 时使用的客户端私钥
server_name = ""          # SNI / 证书 CommonName 校验,默认从 addr 解析
insecure_skip_verify = false # ⚠️ 仅供本地调试,生产环境严禁开启


[etcd]
addresses = "10.22.12.89:2379" # etcd地址，多个etcd使用逗号分隔
username = ""                  # 可选: etcd 鉴权用户名
password = ""                  # 可选: etcd 鉴权密码

# etcd 客户端 TLS,enable=false 时走明文 (向后兼容)
# etcd 是服务发现核心,生产环境强烈建议启用 TLS+认证防止恶意 endpoint 注册
[etcd.tls]
enable = false
ca_file = ""              # 校验 etcd 服务端证书的 CA
cert_file = ""            # 可选: 启用 mTLS 时使用的客户端证书
key_file = ""             # 可选: 启用 mTLS 时使用的客户端私钥
server_name = ""
insecure_skip_verify = false # ⚠️ 仅供本地调试,生产环境严禁开启


[kafka]
addr = "127.0.0.1:9092"   # kafka 地址,多个 broker 使用逗号分隔
client_id = "myapp"       # sarama ClientID,留空使用 sarama 默认
username = ""             # SASL 用户名,留空表示明文连接(无 SASL)
password = ""             # SASL 密码
mechanism = "PLAIN"       # SASL 机制,允许值: PLAIN / SCRAM-SHA-256 / SCRAM-SHA-512

# Kafka 客户端 TLS,enable=false 时走明文 (向后兼容)
# 启用 SASL 但 TLS=false 时为 SASL_PLAINTEXT;两者同时开启为 SASL_SSL
[kafka.tls]
enable = false
ca_file = ""              # 校验 kafka 服务端证书的 CA
cert_file = ""            # 可选: 启用 mTLS 时使用的客户端证书
key_file = ""             # 可选: 启用 mTLS 时使用的客户端私钥
server_name = ""          # SNI / 证书 CommonName 校验
insecure_skip_verify = false # ⚠️ 仅供本地调试,生产环境严禁开启
