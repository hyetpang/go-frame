[server]
run_mode = "prod"

[http]
addr = ":8081"
is_doc = false
doc_path = "/swagger/*any"
is_pprof = false
pprof_prefix = ""
pprof_username = ""
pprof_password = ""
is_metrics = true
metrics_path = "/metrics"
is_prod = true
max_body_bytes = 10485760  # 单个请求体最大字节数,默认 10 MiB

[mysql]
connect_string = "user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8mb4&parseTime=True&loc=Local"
max_idle_time = 30
max_life_time = 60
max_idle_conns = 10
max_open_conns = 100
table_prefix = ""
gorm_log_ignore_record_not_found_error = true
gorm_log_level = 2
name = "default"

[redis]
addr = "127.0.0.1:6379"
pwd = ""
db = 1
pool_size = 0
min_idle_conns = 5
dial_timeout = 5
read_timeout = 5
write_timeout = 5

# 生产环境强烈建议启用 redis TLS+ACL,防止凭据/PII 流量被嗅探
[redis.tls]
enable = false
ca_file = ""
cert_file = ""
key_file = ""
server_name = ""
insecure_skip_verify = false

[log_notice]
name = "myapp"
notice_type = 1
notice = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your_webhook_key"
limit_window_seconds = 60
limit_max_keys = 1024
is_limit_disabled = false

[zap_log]
path = "/var/log/go-frame"
service_name = "myapp"
level = 0
stacktrace_level = 1
is_log_file = true
log_max_size = 128
log_max_backups = 30
log_max_age = 7

[grpc]
address = ""
service_prefix = "grpc_services"
service_names = []

# 生产环境强烈建议启用 TLS:把 enable 改 true 并填入证书/CA 路径
# enable=true 时 cert_file 与 key_file 必填;ca_file 设置后启用 mTLS
[grpc.server_tls]
enable = false
cert_file = ""
key_file = ""
ca_file = ""

[grpc.client_tls]
enable = false
ca_file = ""
cert_file = ""
key_file = ""
server_name = ""
insecure_skip_verify = false

[etcd]
addresses = "127.0.0.1:2379"
username = ""
password = ""

# 生产环境强烈建议启用 etcd TLS+认证,防止恶意 endpoint 注册劫持 gRPC 调用
[etcd.tls]
enable = false
ca_file = ""
cert_file = ""
key_file = ""
server_name = ""
insecure_skip_verify = false

[kafka]
addr = ""
client_id = "myapp"

[gout]
debug = false
timeout = 5
